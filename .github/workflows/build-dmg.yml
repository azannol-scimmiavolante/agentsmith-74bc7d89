name: Build macOS DMG
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyinstaller pillow && pip install -e . || pip install requests python-dotenv pydantic rich
      - name: Find GUI entry point
        id: entry
        run: |
          EP=$(find src -name "gui.py" | head -1)
          if [ -z "$EP" ]; then EP=$(find src -name "main.py" | head -1); fi
          if [ -z "$EP" ]; then EP=$(find src -name "app.py" | head -1); fi
          echo "entry=$EP" >> $GITHUB_OUTPUT
          NAME=$(basename $(dirname $EP))
          echo "name=$NAME" >> $GITHUB_OUTPUT
      - name: Build .app with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "${{ steps.entry.outputs.name }}" \
            "${{ steps.entry.outputs.entry }}"
      - name: Create DMG
        run: |
          brew install create-dmg
          APP=$(find dist -name "*.app" | head -1)
          APPNAME=$(basename "$APP" .app)
          create-dmg \
            --volname "$APPNAME" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "${APPNAME}.dmg" \
            "$APP"
      - name: Upload DMG as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "macOS DMG build"
          files: "*.dmg"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
